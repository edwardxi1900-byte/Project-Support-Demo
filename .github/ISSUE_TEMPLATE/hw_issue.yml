name: 💎 Hardware & PCB Support
description: 提交硬件相关问题 (Submit hardware issues)
labels: ["team:hardware"]
body:
  - type: input
    id: version
    attributes:
      label: Hardware Version
    validations:
      required: true
  - type: textarea
    id: desc
    attributes:
      label: Issue Description
# 关键部分：在这里增加自动通知
  - type: markdown
    attributes:
      value: |
        ---
        > **Internal Notification:** /cc @CB-TECH-SUPPORT/hw-support
        > *提交后，系统将自动通知硬件支持团队。*
